<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Full bleed blue background -->
  <rect width="32" height="32" rx="6" fill="#2563EB"/>
  <!-- White grid — 4 squares, fills the icon tightly like a real app icon -->
  <rect x="4"  y="4"  width="11" height="11" rx="2" fill="white"/>
  <rect x="17" y="4"  width="11" height="11" rx="2" fill="white" opacity="0.7"/>
  <rect x="4"  y="17" width="11" height="11" rx="2" fill="white" opacity="0.7"/>
  <rect x="17" y="17" width="11" height="11" rx="2" fill="white"/>
</svg>
